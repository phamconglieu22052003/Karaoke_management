<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/main-layout :: layout('Lịch sử ca', 'shift', ~{::pageHead}, ~{::section})}"
>
  <th:block th:fragment="pageHead">
    <!-- Flatpickr -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/vn.js"
    ></script>
  </th:block>

  <section>
    <div class="topbar">
      <div>
        <h2 class="page-title">Lịch sử mở/đóng ca</h2>
        <div class="help-text">
          Tra cứu các ca đã mở/đóng để demo và đối soát.
        </div>
      </div>
      <div style="display: flex; gap: 10px; flex-wrap: wrap">
        <a class="btn btn-outline" th:href="@{/shift/current}">Ca hiện tại</a>
        <a class="btn btn-outline" th:href="@{/shift/open}">Mở ca</a>
      </div>
    </div>

    <!-- Bộ lọc -->
    <div class="card" style="margin-bottom: 12px">
      <form th:action="@{/shift/history}" method="get">
        <div class="form-row">
          <div class="field">
            <label class="form-label">Từ</label>
            <input
              class="input datetime-picker"
              type="text"
              name="from"
              th:value="${from}"
              th:placeholder="${dtPattern} + ' hoặc dd/MM/yyyy'"
            />
          </div>

          <div class="field">
            <label class="form-label">Đến</label>
            <input
              class="input datetime-picker"
              type="text"
              name="to"
              th:value="${to}"
              th:placeholder="${dtPattern} + ' hoặc dd/MM/yyyy'"
            />
          </div>

          <div class="field">
            <label class="form-label">Trạng thái</label>
            <select class="input" name="status">
              <option value="" th:selected="${status == null}">Tất cả</option>
              <option
                value="OPEN"
                th:selected="${status != null && status.name() == 'OPEN'}"
              >
                OPEN
              </option>
              <option
                value="CLOSED"
                th:selected="${status != null && status.name() == 'CLOSED'}"
              >
                CLOSED
              </option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" type="submit">Lọc</button>
          <a class="btn btn-outline" th:href="@{/shift/history}">Xoá lọc</a>
        </div>
      </form>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table data-paginate="10">
          <thead>
            <tr>
              <th style="width: 70px">ID</th>
              <th>Ca</th>
              <th style="width: 130px">Trạng thái</th>
              <th style="width: 170px">Mở lúc</th>
              <th style="width: 140px">Mở bởi</th>
              <th style="width: 170px">Đóng lúc</th>
              <th style="width: 140px">Đóng bởi</th>
              <th style="width: 140px; text-align: right">Tiền đầu ca</th>
              <th style="width: 160px; text-align: right">Khai báo cuối ca</th>
              <th style="width: 140px">Hành động</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${shifts == null || #lists.isEmpty(shifts)}">
              <td
                colspan="10"
                style="text-align: center; color: #6b7280; padding: 18px"
              >
                Chưa có ca nào
              </td>
            </tr>

            <tr th:each="s : ${shifts}">
              <td th:text="${s.id}">1</td>
              <td th:text="${s.shiftName}">Ca 27/02</td>
              <td>
                <span
                  class="badge"
                  th:classappend="${s.status.name() == 'OPEN'} ? ' badge-ok' : ' badge-muted'"
                  th:text="${s.status}"
                  >OPEN</span
                >
              </td>
              <td
                th:text="${s.openedAt != null ? #temporals.format(s.openedAt, 'HH:mm dd/MM/yyyy') : '--'}"
              >
                --
              </td>
              <td th:text="${s.openedBy}">admin</td>
              <td
                th:text="${s.closedAt != null ? #temporals.format(s.closedAt, 'HH:mm dd/MM/yyyy') : '--'}"
              >
                --
              </td>
              <td th:text="${s.closedBy != null ? s.closedBy : '--'}">--</td>
              <td
                style="text-align: right"
                th:text="${s.openingCash != null ? #numbers.formatDecimal(s.openingCash, 0, 'COMMA', 0, 'POINT') + ' ₫' : '--'}"
              >
                0 ₫
              </td>
              <td
                style="text-align: right"
                th:text="${s.closingCashDeclared != null ? #numbers.formatDecimal(s.closingCashDeclared, 0, 'COMMA', 0, 'POINT') + ' ₫' : '--'}"
              >
                --
              </td>
              <td>
                <a
                  class="btn btn-outline btn-sm"
                  th:href="@{/shift/{id}(id=${s.id})}"
                  >Xem</a
                >
                <a
                  class="btn btn-outline btn-sm"
                  th:href="@{/shift/{id}/print(id=${s.id})}"
                  target="_blank"
                  >In</a
                >
              </td>
            </tr>
          </tbody>
        </table>
        <script>
          // Flatpickr for time-range filters
          document.addEventListener("DOMContentLoaded", function () {
            if (typeof flatpickr !== "undefined") {
              flatpickr(".datetime-picker", {
                enableTime: true,
                time_24hr: true,
                dateFormat: "H:i d/m/Y",
                locale: "vn",
                allowInput: true,
              });
            }
          });
        </script>
      </div>
    </div>
  </section>
</html>
