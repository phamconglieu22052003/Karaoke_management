<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:replace="~{layout/main-layout :: layout('Chi tiết phiếu', 'inventory', ~{::pageHead}, ~{::section})}"
>
  <th:block th:fragment="pageHead">
    <style>
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: rgba(0, 0, 0, 0.02);
      }
      .muted {
        color: #6b7280;
      }
      .tbl td,
      .tbl th {
        vertical-align: middle;
      }
      .danger {
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.25);
      }
      .ok {
        background: rgba(34, 197, 94, 0.1);
        border-color: rgba(34, 197, 94, 0.25);
      }
    </style>
  </th:block>

  <section>
    <div class="card">
      <div class="card-head">
        <div>
          <h2>Phiếu #<span th:text="${receipt.id}"></span></h2>
          <div class="muted">
            <span class="pill" th:text="${receipt.type}"></span>
            <span class="pill" th:text="${receipt.status}"></span>
            <span
              th:text="${#temporals.format(receipt.createdAt, 'HH:mm dd/MM/yyyy')}"
            ></span>
          </div>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap">
          <a class="btn" th:href="@{/inventory/receipts}">Danh sách</a>
          <a
            class="btn"
            th:if="${receipt.status.name()=='DRAFT'}"
            th:href="@{/inventory/receipts/{id}/edit(id=${receipt.id})}"
            >Sửa</a
          >
        </div>
      </div>

      <div th:if="${msg}" class="alert success" th:text="${msg}"></div>

      <div style="margin-top: 10px">
        <div><b>Ghi chú:</b> <span th:text="${receipt.note}"></span></div>
        <div th:if="${receipt.rejectedReason}">
          <b>Lý do từ chối:</b>
          <span th:text="${receipt.rejectedReason}"></span>
        </div>
      </div>

      <div class="table-wrap" style="margin-top: 12px">
        <table class="tbl">
          <thead>
            <tr>
              <th>Sản phẩm</th>
              <th style="width: 140px">Số lượng</th>
              <th style="width: 200px">Đơn giá</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="l : ${receipt.lines}">
              <td th:text="${l.product != null ? l.product.name : ''}"></td>
              <td th:text="${l.qty}"></td>
              <td th:text="${l.unitPrice}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(receipt.lines)}">
              <td colspan="3" class="muted">Chưa có dòng hàng.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div
        style="margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap"
        sec:authorize="hasAnyRole('MANAGER','STOREKEEPER')"
      >
        <form
          th:if="${receipt.status.name()=='PENDING'}"
          th:action="@{/inventory/receipts/{id}/approve(id=${receipt.id})}"
          method="post"
        >
          <button class="btn primary" type="submit">Duyệt</button>
        </form>
        <form
          th:if="${receipt.status.name()=='PENDING'}"
          th:action="@{/inventory/receipts/{id}/reject(id=${receipt.id})}"
          method="post"
          style="display: flex; gap: 8px; align-items: center"
        >
          <input
            class="input"
            type="text"
            name="reason"
            placeholder="Lý do từ chối"
          />
          <button class="btn" type="submit">Từ chối</button>
        </form>
      </div>
    </div>
  </section>
</html>
