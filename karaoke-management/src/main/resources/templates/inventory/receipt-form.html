<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:replace="~{layout/main-layout :: layout(${editMode == true} ? 'Sửa phiếu' : 'Tạo phiếu', 'inventory', ~{::pageHead}, ~{::section})}"
>
  <th:block th:fragment="pageHead">
    <style>
      .muted {
        color: #6b7280;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .tbl td,
      .tbl th {
        vertical-align: middle;
      }
      .mini {
        width: 120px;
      }
    </style>
  </th:block>

  <section>
    <div class="card">
      <div class="card-head">
        <div>
          <h2 th:text="${editMode == true} ? 'Sửa phiếu' : 'Tạo phiếu'">
            Tạo phiếu
          </h2>
          <div class="muted">Thêm dòng hàng, lưu nháp hoặc gửi duyệt.</div>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap">
          <a class="btn" th:href="@{/inventory/receipts}">Quay lại</a>
        </div>
      </div>

      <div th:if="${error}" class="alert danger" th:text="${error}"></div>

      <form
        method="post"
        th:action="${editMode == true} ? @{/inventory/receipts/{id}(id=${receipt.id})} : @{/inventory/receipts}"
      >
        <input type="hidden" name="type" th:value="${type}" />

        <div class="grid" style="margin-top: 10px">
          <div>
            <label class="muted">Loại phiếu</label>
            <div
              style="font-weight: 900; font-size: 18px"
              th:text="${type}"
            ></div>
          </div>
          <div>
            <label class="muted">Ghi chú</label>
            <input
              class="input"
              type="text"
              name="note"
              th:value="${receipt.note}"
              placeholder="Ví dụ: Nhập nước ngọt"
            />
          </div>
        </div>

        <div
          style="
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
          "
        >
          <h3 style="margin: 0">Dòng hàng</h3>
          <button class="btn" type="button" onclick="addLine()">
            + Thêm dòng
          </button>
        </div>

        <div class="table-wrap" style="margin-top: 10px">
          <table class="tbl" id="linesTable" data-paginate="false">
            <thead>
              <tr>
                <th>Sản phẩm</th>
                <th style="width: 140px">Số lượng</th>
                <th style="width: 180px">Đơn giá (tuỳ chọn)</th>
                <th style="width: 80px"></th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="l : ${receipt.lines}">
                <td>
                  <select class="input" name="productId">
                    <option value="">-- Chọn sản phẩm --</option>
                    <option
                      th:each="p : ${products}"
                      th:value="${p.id}"
                      th:selected="${l.product != null and p.id == l.product.id}"
                      th:text="${p.name}"
                    ></option>
                  </select>
                </td>
                <td>
                  <input
                    class="input mini"
                    type="number"
                    min="1"
                    name="qty"
                    th:value="${l.qty}"
                  />
                </td>
                <td>
                  <input
                    class="input"
                    type="number"
                    step="0.01"
                    min="0"
                    name="unitPrice"
                    th:value="${l.unitPrice}"
                  />
                </td>
                <td>
                  <button class="btn" type="button" onclick="removeLine(this)">
                    X
                  </button>
                </td>
              </tr>
              <tr
                th:if="${receipt.lines == null or #lists.isEmpty(receipt.lines)}"
              >
                <td>
                  <select class="input" name="productId">
                    <option value="">-- Chọn sản phẩm --</option>
                    <option
                      th:each="p : ${products}"
                      th:value="${p.id}"
                      th:text="${p.name}"
                    ></option>
                  </select>
                </td>
                <td>
                  <input
                    class="input mini"
                    type="number"
                    min="1"
                    name="qty"
                    value="1"
                  />
                </td>
                <td>
                  <input
                    class="input"
                    type="number"
                    step="0.01"
                    min="0"
                    name="unitPrice"
                  />
                </td>
                <td>
                  <button class="btn" type="button" onclick="removeLine(this)">
                    X
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div
          style="margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap"
        >
          <button class="btn" name="action" value="save" type="submit">
            Lưu nháp
          </button>
          <button
            class="btn primary"
            name="action"
            value="submit"
            type="submit"
          >
            Gửi duyệt
          </button>
        </div>
      </form>
    </div>

    <script>
      function addLine() {
        const tbody = document.querySelector("#linesTable tbody");
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>
            <select class="input" name="productId">
              <option value="">-- Chọn sản phẩm --</option>
              ${getProductOptionsHtml()}
            </select>
          </td>
          <td><input class="input mini" type="number" min="1" name="qty" value="1" /></td>
          <td><input class="input" type="number" step="0.01" min="0" name="unitPrice" /></td>
          <td><button class="btn" type="button" onclick="removeLine(this)">X</button></td>
        `;
        tbody.appendChild(row);
      }
      function removeLine(btn) {
        const tr = btn.closest("tr");
        if (tr) tr.remove();
      }
      function getProductOptionsHtml() {
        const tpl = document.getElementById("productOptionsTpl");
        return tpl ? tpl.innerHTML : "";
      }
    </script>

    <template id="productOptionsTpl">
      <option
        th:each="p : ${products}"
        th:value="${p.id}"
        th:text="${p.name}"
      ></option>
    </template>
  </section>
</html>
