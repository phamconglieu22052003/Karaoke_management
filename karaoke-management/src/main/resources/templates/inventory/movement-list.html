<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:replace="~{layout/main-layout :: layout('Lịch sử xuất/nhập', 'inventory', ~{::pageHead}, ~{::section})}"
>
  <th:block th:fragment="pageHead">
    <style>
      .muted{ color:#6b7280; }
      .pill { display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; border:1px solid rgba(0,0,0,.08); background:rgba(0,0,0,.02); }
      .danger { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.25); }
      .ok { background: rgba(34,197,94,.1); border-color: rgba(34,197,94,.25); }
      .toolbar{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
      .tbl td, .tbl th { vertical-align: middle; }
    </style>
  </th:block>

  <section>
    <div class="card">
      <div class="card-head">
        <div>
          <h2>Lịch sử xuất/nhập</h2>
          <div class="muted">Theo dõi biến động tồn kho theo phiếu nhập/xuất.</div>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <a class="btn" th:href="@{/inventory/stocks}">Tồn kho</a>
          <a class="btn" th:href="@{/inventory/receipts}">Phiếu</a>
        </div>
      </div>

      <div class="toolbar" style="margin-top: 8px;">
        <form method="get" th:action="@{/inventory/movements}" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          <label class="muted">Sản phẩm</label>
          <select class="input" name="productId" onchange="this.form.submit()">
            <option value="" th:selected="${productId == null}">Tất cả</option>
            <option th:each="p : ${products}" th:value="${p.id}" th:selected="${productId != null and p.id == productId}" th:text="${p.name}"></option>
          </select>
        </form>
      </div>

      <div class="table-wrap" style="margin-top:12px;">
        <table class="tbl">
          <thead>
            <tr>
              <th>Thời gian</th>
              <th>Sản phẩm</th>
              <th style="width:140px;">Biến động</th>
              <th>Tham chiếu</th>
              <th>Ghi chú</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="m : ${movements}">
              <td th:text="${#temporals.format(m.createdAt, 'HH:mm dd/MM/yyyy')}"></td>
              <td>
                <div style="font-weight:800" th:text="${m.product.name}"></div>
                <div class="muted" th:text="${m.product.category != null ? m.product.category.name : ''}"></div>
              </td>
              <td>
                <span class="pill" th:classappend="${m.changeQty} &lt; 0 ? ' danger' : ' ok'" th:text="${m.changeQty}"></span>
              </td>
              <td>
                <span class="pill" th:text="${m.refType}"></span>
                <span class="muted" th:text="${m.refId}"></span>
              </td>
              <td th:text="${m.note}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(movements)}">
              <td colspan="5" class="muted">Chưa có lịch sử.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</html>
