<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:replace="~{layout/main-layout :: layout('Phiếu nhập/xuất', 'inventory', ~{::pageHead}, ~{::section})}"
>
  <th:block th:fragment="pageHead">
    <style>
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: rgba(0, 0, 0, 0.02);
      }
      .muted {
        color: #6b7280;
      }
      .pill-status-draft {
        background: #f9fafb;
        border-color: #e5e7eb;
        color: #6b7280;
      }
      .pill-status-pending {
        background: #fffbeb;
        border-color: #fde68a;
        color: #92400e;
      }
      .pill-status-approved {
        background: #ecfdf5;
        border-color: #a7f3d0;
        color: #065f46;
      }
      .pill-status-rejected {
        background: #fef2f2;
        border-color: #fecaca;
        color: #991b1b;
      }
      .toolbar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
      }
      .filters {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .tbl td,
      .tbl th {
        vertical-align: middle;
      }
    </style>
  </th:block>

  <section>
    <div class="card">
      <div class="card-head">
        <div>
          <h2>Phiếu nhập/xuất</h2>
          <div class="muted">
            Tạo phiếu nhập/xuất, gửi duyệt, duyệt/từ chối.
          </div>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap">
          <a class="btn" th:href="@{/inventory/stocks}">Tồn kho</a>
          <a class="btn" th:href="@{/inventory/movements}">Lịch sử</a>
        </div>
      </div>

      <div th:if="${msg}" class="alert success" th:text="${msg}"></div>

      <div class="toolbar" style="margin-top: 8px">
        <div class="filters">
          <form
            method="get"
            th:action="@{/inventory/receipts}"
            style="display: flex; gap: 10px; align-items: center"
          >
            <label class="muted">Trạng thái</label>
            <select class="input" name="status" onchange="this.form.submit()">
              <option value="ALL" th:selected="${status}=='ALL'">Tất cả</option>
              <option value="DRAFT" th:selected="${status}=='DRAFT'">
                DRAFT
              </option>
              <option value="PENDING" th:selected="${status}=='PENDING'">
                Chờ duyệt
              </option>
              <option value="APPROVED" th:selected="${status}=='APPROVED'">
                Đã duyệt
              </option>
              <option value="REJECTED" th:selected="${status}=='REJECTED'">
                Từ chối
              </option>
            </select>
          </form>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap">
          <a class="btn" th:href="@{/inventory/receipts/new(type='IN')}"
            >+ Phiếu nhập</a
          >
          <a class="btn" th:href="@{/inventory/receipts/new(type='OUT')}"
            >+ Phiếu xuất</a
          >
        </div>
      </div>

      <div class="table-wrap" style="margin-top: 12px">
        <table data-paginate="10" class="tbl">
          <thead>
            <tr>
              <th>ID</th>
              <th>Loại</th>
              <th>Trạng thái</th>
              <th>Ngày tạo</th>
              <th>Ghi chú</th>
              <th style="width: 160px">Thao tác</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="r : ${receipts}">
              <td th:text="${r.id}"></td>
              <td>
                <span class="pill" th:text="${r.type}"></span>
              </td>
              <td>
                <span
                  class="pill"
                  th:classappend="${r.status.name() == 'DRAFT'} ? ' pill-status-draft' : (${r.status.name() == 'PENDING'} ? ' pill-status-pending' : (${r.status.name() == 'APPROVED'} ? ' pill-status-approved' : ' pill-status-rejected'))"
                  th:text="${r.status.label}"
                ></span>
              </td>
              <td
                th:text="${#temporals.format(r.createdAt, 'HH:mm dd/MM/yyyy')}"
              ></td>
              <td th:text="${r.note}"></td>
              <td>
                <a class="btn" th:href="@{/inventory/receipts/{id}(id=${r.id})}"
                  >Xem</a
                >
                <a
                  class="btn"
                  th:if="${r.status.name()=='DRAFT'}"
                  th:href="@{/inventory/receipts/{id}/edit(id=${r.id})}"
                  >Sửa</a
                >
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(receipts)}">
              <td colspan="6" class="muted">Chưa có phiếu.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</html>
