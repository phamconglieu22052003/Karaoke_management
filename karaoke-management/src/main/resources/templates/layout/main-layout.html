<!doctype html>
<html
  lang="vi"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:fragment="layout(title, active, pageHead, content)"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${title}">Karaoke Management</title>

    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <th:block th:replace="${pageHead}" />
  </head>

  <body>
    <div class="app-shell">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <div class="brand-mark">KM</div>
          <div class="brand-text">
            <div class="brand-name">Karaoke</div>
            <div class="brand-sub">Management</div>
          </div>
        </div>

        <nav class="nav">
          <a
            class="nav-item"
            th:classappend="${active} == 'dashboard' ? ' active' : ''"
            th:attr="aria-current=${active} == 'dashboard' ? 'page' : null"
            th:href="@{/dashboard}"
          >
            Dashboard
          </a>
          <a
            class="nav-item"
            th:classappend="${active} == 'rooms' ? ' active' : ''"
            th:attr="aria-current=${active} == 'rooms' ? 'page' : null"
            th:href="@{/rooms}"
            sec:authorize="hasAnyRole('MANAGER','CASHIER','WAITER')"
          >
            Phòng
          </a>
          <a
            class="nav-item"
            th:classappend="${active} == 'roomTypes' ? ' active' : ''"
            th:attr="aria-current=${active} == 'roomTypes' ? 'page' : null"
            th:href="@{/room-types}"
            sec:authorize="hasRole('MANAGER')"
          >
            Loại phòng
          </a>
          <a
            class="nav-item"
            th:classappend="${active} == 'booking' ? ' active' : ''"
            th:attr="aria-current=${active} == 'booking' ? 'page' : null"
            th:href="@{/booking}"
            sec:authorize="hasAnyRole('MANAGER','CASHIER')"
          >
            Đặt phòng
          </a>
          <a
            class="nav-item"
            th:classappend="${active} == 'sessions' ? ' active' : ''"
            th:attr="aria-current=${active} == 'sessions' ? 'page' : null"
            th:href="@{/room-sessions}"
            sec:authorize="hasAnyRole('MANAGER','CASHIER','WAITER')"
          >
            Mở/đóng phòng
          </a>
          <a
            class="nav-item"
            th:classappend="${active} == 'invoices' ? ' active' : ''"
            th:attr="aria-current=${active} == 'invoices' ? 'page' : null"
            th:href="@{/invoice}"
            sec:authorize="hasAnyRole('MANAGER','CASHIER')"
          >
            Hóa đơn
          </a>

          <a
            class="nav-item"
            th:classappend="${active} == 'shift' ? ' active' : ''"
            th:attr="aria-current=${active} == 'shift' ? 'page' : null"
            th:href="@{/shift/history}"
            sec:authorize="hasAnyRole('MANAGER','CASHIER')"
          >
            Ca làm
          </a>

          <a
            class="nav-item"
            th:classappend="${active} == 'inventory' ? ' active' : ''"
            th:attr="aria-current=${active} == 'inventory' ? 'page' : null"
            th:href="@{/inventory/stocks}"
            sec:authorize="hasAnyRole('MANAGER','STOREKEEPER')"
          >
            Kho
          </a>

          <a
            class="nav-item"
            th:classappend="${active} == 'tech' ? ' active' : ''"
            th:attr="aria-current=${active} == 'tech' ? 'page' : null"
            th:href="@{/tech/rooms}"
            sec:authorize="hasAnyRole('MANAGER','TECHNICIAN')"
          >
            Kỹ thuật
          </a>

          <a
            class="nav-item"
            th:classappend="${active} == 'products' ? ' active' : ''"
            th:attr="aria-current=${active} == 'products' ? 'page' : null"
            th:href="@{/products}"
            sec:authorize="hasAnyRole('MANAGER','STOREKEEPER')"
          >
            Sản phẩm
          </a>

          <a
            class="nav-item"
            th:classappend="${active} == 'productCategories' ? ' active' : ''"
            th:attr="aria-current=${active} == 'productCategories' ? 'page' : null"
            th:href="@{/product-categories}"
            sec:authorize="hasAnyRole('MANAGER','STOREKEEPER')"
          >
            Danh mục SP
          </a>

          <a
            class="nav-item"
            th:classappend="${active} == 'users' ? ' active' : ''"
            th:attr="aria-current=${active} == 'users' ? 'page' : null"
            th:href="@{/users}"
            sec:authorize="hasRole('MANAGER')"
          >
            Người dùng
          </a>

          <a
            class="nav-item"
            th:classappend="${active} == 'profile' ? ' active' : ''"
            th:attr="aria-current=${active} == 'profile' ? 'page' : null"
            th:href="@{/profile/password}"
            sec:authorize="isAuthenticated()"
          >
            Đổi mật khẩu
          </a>
        </nav>

        <div class="sidebar-foot">
          <div class="who">
            <div class="who-label">Đăng nhập</div>
            <div
              class="who-name"
              th:text="${#authentication != null ? #authentication.name : 'guest'}"
            >
              admin
            </div>
          </div>
          <form th:action="@{/logout}" method="post" style="margin: 0">
            <button class="btn btn-outline btn-sm w-100" type="submit">
              Đăng xuất
            </button>
          </form>
        </div>
      </aside>

      <!-- Main -->
      <div class="main">
        <header class="app-header">
          <button
            class="icon-btn"
            type="button"
            aria-label="Toggle sidebar"
            onclick="toggleSidebar()"
          >
            ☰
          </button>

          <div class="app-header-title">
            <div class="title" th:text="${title}">Karaoke Management</div>
            <div class="subtitle">Quản lý vận hành quán karaoke</div>
          </div>

          <div
            class="current-page-badge"
            th:if="${title != null}"
            th:text="'Trang đang chọn: ' + ${title}"
          >
            Trang đang chọn: Dashboard
          </div>

          <div class="app-header-actions">
            <a class="btn btn-outline btn-sm" th:href="@{/dashboard}"
              >Trang chủ</a
            >
          </div>
        </header>

        <main class="app-content">
          <div class="container-fluid app-container">
            <th:block th:insert="${content}" />
          </div>
        </main>
      </div>
    </div>

    <div class="confirm-modal" id="appConfirmModal" hidden>
      <div class="confirm-modal__backdrop" data-confirm-close></div>
      <div
        class="confirm-modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="appConfirmTitle"
        aria-describedby="appConfirmMessage"
      >
        <div class="confirm-modal__title" id="appConfirmTitle">
          Xác nhận thao tác
        </div>
        <div class="confirm-modal__message" id="appConfirmMessage">
          Bạn có chắc muốn tiếp tục?
        </div>
        <div class="confirm-modal__actions">
          <button type="button" class="btn btn-outline" id="appConfirmCancel">
            Hủy
          </button>
          <button type="button" class="btn btn-primary" id="appConfirmOk">
            Đồng ý
          </button>
        </div>
      </div>
    </div>

    <script>
      function toggleSidebar() {
        const el = document.getElementById("sidebar");
        el.classList.toggle("open");
      }
      // Close sidebar when clicking outside (mobile)
      document.addEventListener("click", function (e) {
        const sidebar = document.getElementById("sidebar");
        const isMobile = window.matchMedia("(max-width: 960px)").matches;
        if (!isMobile) return;
        if (!sidebar.classList.contains("open")) return;
        const clickedInside =
          sidebar.contains(e.target) ||
          (e.target && e.target.closest && e.target.closest(".icon-btn"));
        if (!clickedInside) sidebar.classList.remove("open");
      });

      (function () {
        const modal = document.getElementById("appConfirmModal");
        const titleEl = document.getElementById("appConfirmTitle");
        const messageEl = document.getElementById("appConfirmMessage");
        const okBtn = document.getElementById("appConfirmOk");
        const cancelBtn = document.getElementById("appConfirmCancel");
        let resolver = null;

        function closeConfirm(result) {
          if (!modal) return;
          modal.hidden = true;
          document.body.classList.remove("confirm-modal-open");
          if (resolver) {
            resolver(result);
            resolver = null;
          }
        }

        function showConfirm(message, title) {
          if (!modal) return Promise.resolve(true);
          titleEl.textContent = title || "Xác nhận thao tác";
          messageEl.textContent = message || "Bạn có chắc muốn tiếp tục?";
          modal.hidden = false;
          document.body.classList.add("confirm-modal-open");
          return new Promise(function (resolve) {
            resolver = resolve;
            window.requestAnimationFrame(function () {
              okBtn.focus();
            });
          });
        }

        window.appShowConfirm = showConfirm;

        okBtn.addEventListener("click", function () {
          closeConfirm(true);
        });

        cancelBtn.addEventListener("click", function () {
          closeConfirm(false);
        });

        modal.addEventListener("click", function (e) {
          if (e.target.hasAttribute("data-confirm-close")) {
            closeConfirm(false);
          }
        });

        document.addEventListener("keydown", function (e) {
          if (modal.hidden) return;
          if (e.key === "Escape") closeConfirm(false);
        });

        document.addEventListener(
          "submit",
          function (e) {
            const form = e.target;
            if (!form || !form.matches || !form.matches("form[data-confirm]"))
              return;
            if (form.dataset.confirmBypass === "1") {
              form.dataset.confirmBypass = "0";
              return;
            }
            e.preventDefault();
            showConfirm(form.dataset.confirm, form.dataset.confirmTitle).then(
              function (confirmed) {
                if (!confirmed) return;
                form.dataset.confirmBypass = "1";
                form.submit();
              },
            );
          },
          true,
        );
      })();
    </script>

    <script th:src="@{/js/table-pagination.js}"></script>
  </body>
</html>
