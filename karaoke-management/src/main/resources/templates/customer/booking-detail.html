<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Tra cứu đặt phòng</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<div class="container" style="max-width:720px;margin:24px auto;">
  <div class="card">
    <div class="card-head">
      <div class="card-title">Tra cứu đặt phòng</div>
      <div class="muted">Mã đặt phòng: <b th:text="${booking.id}"></b></div>
    </div>
    <div class="card-body">

      <div class="kv">
        <div class="kv-row"><div class="kv-k">Khách</div><div class="kv-v" th:text="${booking.customerName}"></div></div>
        <div class="kv-row"><div class="kv-k">SĐT</div><div class="kv-v" th:text="${booking.phone != null ? booking.phone : booking.customerPhone}"></div></div>
        <div class="kv-row"><div class="kv-k">Phòng</div><div class="kv-v" th:text="${booking.room != null ? booking.room.name : ''}"></div></div>
        <div class="kv-row"><div class="kv-k">Bắt đầu</div><div class="kv-v" th:text="${booking.startTime != null ? dt.format(booking.startTime) : ''}"></div></div>
        <div class="kv-row"><div class="kv-k">Kết thúc</div><div class="kv-v" th:text="${booking.endTime != null ? dt.format(booking.endTime) : ''}"></div></div>
        <div class="kv-row"><div class="kv-k">Trạng thái</div><div class="kv-v"><span class="pill" th:text="${booking.status}"></span></div></div>
      </div>

      <div class="muted" style="margin-top:12px;">
        Ghi chú: Trạng thái BOOKED là yêu cầu mới gửi. Nhân viên có thể CONFIRMED hoặc CANCELLED.
      </div>

      <div style="margin-top:16px;display:flex;gap:10px;align-items:center;">
        <a class="btn" th:href="@{/customer/booking/new}">Đặt phòng mới</a>
        <a class="link" th:href="@{/login}">Đăng nhập nhân viên</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
