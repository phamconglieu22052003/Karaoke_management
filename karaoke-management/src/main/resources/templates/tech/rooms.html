<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/main-layout :: layout('Kỹ thuật', 'tech', ~{::pageHead}, ~{::section})}"
>
  <th:block th:fragment="pageHead"></th:block>

  <section>
    <div class="topbar">
      <div>
        <h2 class="page-title">Kỹ thuật - Trạng thái phòng</h2>
        <div class="help-text">
          Chuyển phòng sang <b>Bảo trì</b> hoặc <b>Trống</b> sau khi xử lý.
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <table data-paginate="10" class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Tên phòng</th>
              <th>Sức chứa</th>
              <th>Trạng thái</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="r: ${rooms}">
              <td th:text="${r.id}"></td>
              <td th:text="${r.name}"></td>
              <td th:text="${r.capacity}"></td>
              <td><span class="pill" th:text="${r.status.label}"></span></td>
              <td style="display: flex; gap: 8px">
                <form
                  th:action="@{'/tech/rooms/' + ${r.id} + '/maintenance'}"
                  method="post"
                >
                  <button
                    class="btn"
                    type="submit"
                    th:disabled="${r.status.name() == 'OCCUPIED'}"
                  >
                    Bảo trì
                  </button>
                </form>
                <form
                  th:action="@{'/tech/rooms/' + ${r.id} + '/available'}"
                  method="post"
                >
                  <button class="btn" type="submit">Trống</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</html>
