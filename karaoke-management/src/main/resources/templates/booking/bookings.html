<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <title>Danh sách đặt phòng</title>
  </head>
  <body>
    <div
      style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      "
    >
      <div>Xin chào, <b th:text="${#authentication.name}">user</b></div>

      <form th:action="@{/logout}" method="post" style="margin: 0">
        <button type="submit">Đăng xuất</button>
      </form>
    </div>
    <hr />

    <h2>Danh sách đặt phòng</h2>

    <p>
      <a th:href="@{/dashboard}">🏠 Dashboard</a> |
      <a th:href="@{/rooms}">🎤 Phòng</a> |
      <a th:href="@{/booking/new}">+ Đặt phòng</a>
    </p>

    <table border="1" cellpadding="8" cellspacing="0" width="100%">
      <thead>
        <tr>
          <th>ID</th>
          <th>Khách</th>
          <th>SĐT</th>
          <th>Phòng</th>
          <th>Bắt đầu</th>
          <th>Kết thúc</th>
          <th>Trạng thái</th>
        </tr>
      </thead>

      <tbody>
        <tr th:if="${#lists.isEmpty(bookings)}">
          <td colspan="7" align="center">Chưa có đặt phòng nào.</td>
        </tr>

        <tr th:each="b : ${bookings}">
          <td th:text="${b.id}"></td>
          <td th:text="${b.customerName}"></td>
          <td th:text="${b.customerPhone}"></td>
          <td th:text="${b.room != null ? b.room.name : ''}"></td>
          <td
            th:text="${#temporals.format(b.startTime, 'HH:mm dd/MM/yyyy')}"
          ></td>
          <td
            th:text="${#temporals.format(b.endTime, 'HH:mm dd/MM/yyyy')}"
          ></td>
          <td th:text="${b.status.label}"></td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
