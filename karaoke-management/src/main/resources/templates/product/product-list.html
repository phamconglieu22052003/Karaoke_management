<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/main-layout :: layout('Sản phẩm', 'products', ~{::pageHead}, ~{::section})}"
>
  <th:block th:fragment="pageHead">
    <style>
      .product-page-stack {
        display: grid;
        gap: 18px;
      }

      .product-form-card {
        padding: 18px;
      }

      .product-form-grid {
        display: grid;
        grid-template-columns: 1.4fr 1fr 1fr 1fr auto;
        gap: 12px;
        align-items: end;
      }

      .product-status-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-bottom: 10px;
      }

      .product-form-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        align-items: center;
      }

      .product-list-card {
        padding: 14px;
      }

      .product-list-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      @media (max-width: 1100px) {
        .product-form-grid {
          grid-template-columns: 1fr 1fr;
        }

        .product-form-actions {
          justify-content: flex-start;
        }
      }

      @media (max-width: 768px) {
        .product-form-grid,
        .product-list-header {
          grid-template-columns: 1fr;
          display: grid;
        }

        .product-status-row,
        .product-form-actions {
          justify-content: flex-start;
          flex-wrap: wrap;
        }
      }
    </style>
  </th:block>

  <section>
    <div class="topbar">
      <div>
        <h2 class="page-title">Sản phẩm</h2>
        <div class="help-text">
          Quản lý danh sách món/đồ uống dùng cho gọi món.
        </div>
      </div>
      <div style="display: flex; gap: 10px; flex-wrap: wrap">
        <a class="btn btn-outline" th:href="@{/product-categories}">Danh mục</a>
        <a class="btn btn-outline" th:href="@{/room-sessions}"
          >← Mở/đóng phòng</a
        >
      </div>
    </div>

    <div th:if="${msg != null}" class="alert success" th:text="${msg}"></div>

    <div class="product-page-stack">
      <div class="card product-form-card">
        <div
          style="
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 14px;
            flex-wrap: wrap;
          "
        >
          <div>
            <h3
              style="margin: 0 0 6px"
              th:text="${editing != null and editing} ? 'Cập nhật sản phẩm' : 'Thêm sản phẩm'"
            >
              Thêm sản phẩm
            </h3>
          </div>
        </div>

        <form th:action="@{/products/save}" method="post">
          <input type="hidden" name="id" th:value="${product.id}" />

          <div class="product-form-grid">
            <div>
              <label class="form-label">Tên sản phẩm</label>
              <input
                class="input"
                type="text"
                name="name"
                th:value="${product.name}"
                placeholder="VD: Bia Tiger"
                required
              />
            </div>

            <div>
              <label class="form-label">Giá</label>
              <input
                class="input"
                type="number"
                step="0.01"
                name="price"
                th:value="${product.price}"
                required
              />
            </div>

            <div>
              <label class="form-label">Đơn vị</label>
              <input
                class="input"
                type="text"
                name="unit"
                th:value="${product.unit}"
                placeholder="lon / chai / đĩa"
              />
            </div>

            <div>
              <label class="form-label">Danh mục</label>
              <select class="input" name="categoryId">
                <option value="">-- Không chọn --</option>
                <option
                  th:each="c : ${categories}"
                  th:value="${c.id}"
                  th:text="${c.name}"
                  th:selected="${product.category != null && product.category.id == c.id}"
                >
                  Food
                </option>
              </select>
            </div>

            <div>
              <label class="form-label">Trạng thái</label>
              <label class="product-status-row">
                <input
                  type="checkbox"
                  name="active"
                  value="true"
                  th:checked="${product.active == null || product.active}"
                />
                <span style="font-weight: 800">Đang bán</span>
              </label>
            </div>
          </div>

          <div class="product-form-actions" style="margin-top: 14px">
            <a
              class="btn btn-outline"
              th:if="${editing != null and editing}"
              th:href="@{/products}"
              >Hủy</a
            >
            <button class="btn btn-primary" type="submit">Lưu sản phẩm</button>
          </div>
        </form>
      </div>

      <div class="card product-list-card">
        <div class="product-list-header">
          <div>
            <h3 style="margin: 0 0 4px">Danh sách sản phẩm</h3>
          </div>
          <div
            class="help-text"
            th:text="'Tổng số: ' + ${#lists.size(products)} + ' sản phẩm'"
          >
            Tổng số: 0 sản phẩm
          </div>
        </div>

        <div class="table-wrap">
          <table data-paginate="10">
            <thead>
              <tr>
                <th style="width: 70px">ID</th>
                <th>Tên</th>
                <th>Danh mục</th>
                <th style="width: 120px">Giá</th>
                <th style="width: 110px">Đơn vị</th>
                <th style="width: 110px">Trạng thái</th>
                <th style="width: 220px">Hành động</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(products)}">
                <td
                  colspan="7"
                  style="text-align: center; color: #6b7280; padding: 18px"
                >
                  Chưa có sản phẩm
                </td>
              </tr>
              <tr th:each="p : ${products}">
                <td th:text="${p.id}">1</td>
                <td th:text="${p.name}">Bia</td>
                <td th:text="${p.category != null ? p.category.name : ''}">
                  Đồ uống
                </td>
                <td
                  th:text="${p.price != null ? #numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + ' ₫' : ''}"
                >
                  20,000 ₫
                </td>
                <td th:text="${p.unit}">lon</td>
                <td>
                  <span
                    class="badge"
                    th:classappend="${p.active} ? ' badge-ok' : ' badge-muted'"
                    th:text="${p.active} ? 'ACTIVE' : 'INACTIVE'"
                    >ACTIVE</span
                  >
                </td>
                <td>
                  <div class="actions">
                    <a
                      class="btn btn-outline btn-sm"
                      th:href="@{/products/edit/{id}(id=${p.id})}"
                      >Sửa</a
                    >
                    <form
                      th:action="@{/products/toggle/{id}(id=${p.id})}"
                      method="post"
                      style="display: inline"
                      onsubmit="return confirm('Đổi trạng thái sản phẩm?');"
                    >
                      <button class="btn btn-danger btn-sm" type="submit">
                        Đổi trạng thái
                      </button>
                    </form>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>
</html>
