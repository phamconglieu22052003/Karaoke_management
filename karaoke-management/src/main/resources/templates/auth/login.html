<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng nhập</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" />
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-head">
        <div class="mark">KM</div>
        <div>
          <h1>Đăng nhập hệ thống</h1>
          <div class="sub">Karaoke Management</div>
        </div>
      </div>

      <div class="card">
        <div th:if="${param.error}" class="alert">
          <span th:if="${param.error[0] == 'inactive'}"
            >Tài khoản đang bị khóa / không hoạt động</span
          >
          <span th:if="${param.error[0] == 'noperm'}"
            >Tài khoản không có quyền truy cập hệ thống</span
          >
          <span
            th:if="${param.error[0] != 'inactive' and param.error[0] != 'noperm'}"
            >Sai tài khoản hoặc mật khẩu</span
          >
        </div>

        <form th:action="@{/login}" method="post">
          <label>Username</label>
          <input type="text" name="username" required autocomplete="username" />

          <label>Password</label>
          <input
            type="password"
            name="password"
            required
            autocomplete="current-password"
          />

          <div class="actions">
            <button type="submit">Đăng nhập</button>
          </div>

          <div style="margin-top: 12px; text-align: center">
            <a th:href="@{/customer/booking/new}"
              >Khách hàng: Đặt phòng online</a
            >
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
