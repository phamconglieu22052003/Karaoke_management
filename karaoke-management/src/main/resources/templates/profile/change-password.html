<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/main-layout :: layout('Đổi mật khẩu', 'profile', ~{::pageHead}, ~{::section})}"
>
  <th:block th:fragment="pageHead"></th:block>

  <section>
    <div class="topbar">
      <div>
        <h2 class="page-title">Đổi mật khẩu</h2>
      </div>
    </div>

    <div th:if="${success}" class="alert success" th:text="${success}"></div>
    <div th:if="${error}" class="alert danger" th:text="${error}"></div>

    <div class="card" style="padding: 14px; max-width: 560px">
      <form th:action="@{/profile/password}" method="post" th:object="${form}">
        <div class="field">
          <div class="label">Mật khẩu hiện tại</div>
          <input
            class="input"
            type="password"
            th:field="*{oldPassword}"
            required
          />
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1fr">
          <div class="field">
            <div class="label">Mật khẩu mới</div>
            <input
              class="input"
              type="password"
              th:field="*{newPassword}"
              minlength="6"
              placeholder=">= 6 ký tự"
              required
            />
          </div>

          <div class="field">
            <div class="label">Xác nhận mật khẩu mới</div>
            <input
              class="input"
              type="password"
              th:field="*{confirmPassword}"
              minlength="6"
              required
            />
          </div>
        </div>

        <div
          style="
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 14px;
          "
        >
          <button class="btn btn-primary" type="submit">Lưu</button>
        </div>
      </form>
    </div>
  </section>
</html>
