<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/main-layout :: layout('Mở/đóng phòng', 'sessions', ~{::pageHead}, ~{::section})}"
>
  <th:block th:fragment="pageHead">
    <!-- Flatpickr -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/vn.js"
    ></script>
  </th:block>

  <section>
    <div class="topbar">
      <div>
        <h2 class="page-title">Lịch sử mở phòng</h2>
        <div class="help-text">
          Theo dõi session và tạo hóa đơn sau khi đóng phòng.
        </div>
      </div>
      <div style="display: flex; gap: 10px; flex-wrap: wrap">
        <a class="btn btn-outline" th:href="@{/rooms}">← Danh sách phòng</a>
      </div>
    </div>

    <!-- Bộ lọc -->
    <div class="card" style="margin-bottom: 12px">
      <form th:action="@{/room-sessions}" method="get">
        <div class="form-row">
          <div class="field">
            <label class="form-label">Từ</label>
            <input
              class="input datetime-picker"
              type="text"
              name="from"
              th:value="${from}"
              th:placeholder="${dtPattern} + ' hoặc dd/MM/yyyy'"
            />
          </div>

          <div class="field">
            <label class="form-label">Đến</label>
            <input
              class="input datetime-picker"
              type="text"
              name="to"
              th:value="${to}"
              th:placeholder="${dtPattern} + ' hoặc dd/MM/yyyy'"
            />
          </div>

          <div class="field">
            <label class="form-label">Trạng thái</label>
            <select class="input" name="status">
              <option value="" th:selected="${status == null}">Tất cả</option>
              <option
                value="OPEN"
                th:selected="${status != null && status.name() == 'OPEN'}"
              >
                OPEN
              </option>
              <option
                value="ACTIVE"
                th:selected="${status != null && status.name() == 'ACTIVE'}"
              >
                ACTIVE
              </option>
              <option
                value="CLOSED"
                th:selected="${status != null && status.name() == 'CLOSED'}"
              >
                CLOSED
              </option>
            </select>
          </div>

          <div class="field">
            <label class="form-label">Phòng</label>
            <select class="input" name="roomId">
              <option value="" th:selected="${roomId == null}">Tất cả</option>
              <option
                th:each="r: ${rooms}"
                th:value="${r.id}"
                th:text="${r.name}"
                th:selected="${roomId != null && r.id == roomId}"
              ></option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" type="submit">Lọc</button>
          <a class="btn btn-outline" th:href="@{/room-sessions}">Xoá lọc</a>
        </div>
      </form>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table data-paginate="10">
          <thead>
            <tr>
              <th style="width: 70px">ID</th>
              <th>Phòng</th>
              <th>Bắt đầu</th>
              <th>Kết thúc</th>
              <th style="width: 110px">Trạng thái</th>
              <th style="width: 90px">Phút</th>
              <th style="width: 130px">Tổng tiền</th>
              <th>Mở bởi</th>
              <th>Đóng bởi</th>
              <th style="width: 220px">Hành động</th>
            </tr>
          </thead>

          <tbody>
            <tr th:if="${#lists.isEmpty(sessions)}">
              <td
                colspan="10"
                style="text-align: center; color: #6b7280; padding: 18px"
              >
                Chưa có session nào
              </td>
            </tr>

            <tr th:each="s : ${sessions}">
              <td th:text="${s.id}">1</td>
              <td th:text="${s.room != null ? s.room.name : ''}">P101</td>
              <td
                th:text="${s.startTime != null ? #temporals.format(s.startTime, 'HH:mm dd/MM/yyyy') : ''}"
              >
                01:10 21/01/2026
              </td>
              <td
                th:text="${s.endTime != null ? #temporals.format(s.endTime, 'HH:mm dd/MM/yyyy') : ''}"
              >
                02:10 21/01/2026
              </td>
              <td>
                <span
                  class="badge"
                  th:classappend="${s.status.name() == 'OPEN'} ? ' badge-ok' : ' badge-muted'"
                  th:text="${s.status}"
                  >OPEN</span
                >
              </td>
              <td th:text="${s.totalMinutes}">60</td>
              <td>
                <span
                  th:text="${s.totalAmount != null ? #numbers.formatDecimal(s.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫' : ''}"
                  >100,000 ₫</span
                >
              </td>
              <td th:text="${s.createdBy}">admin</td>
              <td th:text="${s.checkedOutBy}">admin</td>

              <td>
                <div class="actions">
                  <a
                    th:if="${s.status.name() == 'OPEN'}"
                    class="btn btn-outline btn-sm"
                    th:href="@{/pos/sessions/{sessionId}/order(sessionId=${s.id})}"
                    >Gọi món</a
                  >

                  <a
                    th:if="${s.status.name() == 'CLOSED'}"
                    class="btn btn-outline btn-sm"
                    th:href="@{/pos/sessions/{sessionId}/order/view(sessionId=${s.id})}"
                    >Xem order</a
                  >

                  <form
                    th:if="${s.status.name() == 'OPEN'}"
                    th:action="@{/room-sessions/close/{id}(id=${s.id})}"
                    method="post"
                    style="display: inline"
                    onsubmit="return confirm('Đóng phòng và tính tiền?');"
                  >
                    <button class="btn btn-primary btn-sm" type="submit">
                      Đóng phòng
                    </button>
                  </form>

                  <a
                    th:if="${s.status.name() == 'CLOSED'}"
                    class="btn btn-outline btn-sm"
                    th:href="@{/invoice/create/{roomSessionId}(roomSessionId=${s.id})}"
                    >Tạo/Xem hóa đơn</a
                  >
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <script>
      // Flatpickr for time-range filters
      document.addEventListener("DOMContentLoaded", function () {
        if (typeof flatpickr !== "undefined") {
          flatpickr(".datetime-picker", {
            enableTime: true,
            time_24hr: true,
            dateFormat: "H:i d/m/Y",
            locale: "vn",
            allowInput: true,
          });
        }
      });
    </script>
  </section>
</html>
